name: Concierto Monitor Diario

on:
  schedule:
    # Runs every 15 minutes (e.g., 1:00, 1:15, 1:30, 1:45)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    # Otorgamos permisos de escritura explícitos para el archivo seen_events.json
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          # Trae todo el historial para evitar conflictos de git
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar Monitor de Conciertos
        env:
          # Usamos los Secrets que configuraste en GitHub
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Sincronizar y subir cambios
        run: |
          git config --global user.name 'TicketBot'
          git config --global user.email 'bot@github.com'
          
          # Añadimos el archivo de historial
          git add seen_events.json
          
          # Verificamos si hay algo nuevo que guardar
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Actualizar historial de conciertos vistos [skip ci]"
            
            # El rebase es vital para evitar el error "Updates were rejected"
            git pull --rebase origin main
            
            git push origin main
          else
            echo "No se detectaron conciertos nuevos. Nada que subir."
          fi
